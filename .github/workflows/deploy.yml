name: Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          UMAMI_AUTH_TOKEN: ${{ secrets.UMAMI_AUTH_TOKEN }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-preview:
    needs: build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract worker from dist
        run: |
          mkdir -p worker
          cp -r dist/_worker.js/* worker/

      - name: Deploy preview
        id: deploy
        run: |
          set -euo pipefail
          bunx sst install
          bunx sst deploy --stage pr-${{ github.event.pull_request.number }} --print-logs | tee deploy.log
          node -e "const fs = require('fs'); const text = fs.readFileSync('deploy.log', 'utf8'); const matches = text.match(/https:\/\/[a-z0-9.-]+\.workers\.dev/g); const url = matches ? matches[matches.length - 1] : ''; fs.appendFileSync(process.env.GITHUB_OUTPUT, `url=${url}\n`);"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SST_STAGE: pr-${{ github.event.pull_request.number }}

      - name: Update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const stage = `pr-${prNumber}`;
            const sha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const url = `${{ steps.deploy.outputs.url }}`;

            const marker = "<!-- sst-preview -->";
            const body = [
              marker,
              "### SST Preview",
              `- URL: ${url || "(output missing - check deploy logs)"}`,
              `- Stage: ${stage}`,
              `- Commit: ${sha}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Remove preview
        run: |
          set -euo pipefail
          bunx sst install
          bunx sst remove --stage pr-${{ github.event.pull_request.number }} --print-logs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SST_STAGE: pr-${{ github.event.pull_request.number }}
